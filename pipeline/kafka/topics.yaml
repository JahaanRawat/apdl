# Kafka topics for Phase 3+ migration
# Migrate when: >10K events/sec sustained or >7 day retention needed
topics:
  events.raw:
    partitions: 32
    replication_factor: 3
    retention_ms: 604800000    # 7 days
    key: "project_id:user_id"

  events.enriched:
    partitions: 32
    replication_factor: 3
    retention_ms: 604800000
    key: "project_id:user_id"

  events.sessions:
    partitions: 16
    replication_factor: 3
    retention_ms: 604800000
    key: "project_id:session_id"

  agent.tasks:
    partitions: 8
    replication_factor: 3
    retention_ms: 259200000    # 3 days
    key: "project_id"

  insights.generated:
    partitions: 8
    replication_factor: 3
    retention_ms: 2592000000   # 30 days
    key: "project_id"

  agent.audit:
    partitions: 4
    replication_factor: 3
    retention_ms: 7776000000   # 90 days
    key: "project_id"
