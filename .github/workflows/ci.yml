name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: sdk/javascript
      - run: npm test -- --coverage
        working-directory: sdk/javascript
      - run: npm run build
        working-directory: sdk/javascript

  query-service:
    name: Query Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/query
      - run: ruff check app/
        working-directory: services/query

  agents-service:
    name: Agents Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/agents
      - run: ruff check app/
        working-directory: services/agents

  ingestion-service:
    name: Ingestion Service Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Install dependencies and build
        working-directory: services/ingestion
        run: |
          conan install . --build=missing --output-folder=build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake
          cmake --build . -j$(nproc)
      - name: Test
        working-directory: services/ingestion/build
        run: ctest --output-on-failure

  config-service:
    name: Config Service Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Install dependencies and build
        working-directory: services/config
        run: |
          conan install . --build=missing --output-folder=build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake
          cmake --build . -j$(nproc)
      - name: Test
        working-directory: services/config/build
        run: ctest --output-on-failure
