apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-writer
  namespace: apdl
  labels:
    app.kubernetes.io/name: clickhouse-writer
    app.kubernetes.io/part-of: apdl
    app.kubernetes.io/component: pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse-writer
        app.kubernetes.io/part-of: apdl
        app.kubernetes.io/component: pipeline
    spec:
      serviceAccountName: clickhouse-writer
      terminationGracePeriodSeconds: 60
      containers:
        - name: clickhouse-writer
          image: apdl/clickhouse-writer:latest
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: redis-port
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: clickhouse-host
            - name: CLICKHOUSE_HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: clickhouse-http-port
            - name: CLICKHOUSE_NATIVE_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: clickhouse-native-port
            - name: BATCH_SIZE
              value: "10000"
            - name: FLUSH_INTERVAL_MS
              value: "5000"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: log-level
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 500Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - clickhouse-writer
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clickhouse-writer
  namespace: apdl
  labels:
    app.kubernetes.io/name: clickhouse-writer
    app.kubernetes.io/part-of: apdl
