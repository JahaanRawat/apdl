apiVersion: v1
kind: ConfigMap
metadata:
  name: apdl-config
  namespace: apdl
  labels:
    app.kubernetes.io/part-of: apdl
data:
  # These values are overridden per environment via Kustomize patches
  redis-host: "redis.apdl.local"
  redis-port: "6379"
  clickhouse-host: "clickhouse.apdl.local"
  clickhouse-http-port: "8123"
  clickhouse-native-port: "9000"
  postgres-host: "postgres.apdl.local"
  postgres-port: "5432"
  postgres-db: "apdl"
  log-level: "info"
