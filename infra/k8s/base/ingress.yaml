apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apdl-ingress
  namespace: apdl
  labels:
    app.kubernetes.io/part-of: apdl
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/group.name: apdl
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Ingestion API: event collection endpoint
          - path: /v1/events
            pathType: Prefix
            backend:
              service:
                name: ingestion
                port:
                  name: http
          # Ingestion API: batch endpoint
          - path: /v1/batch
            pathType: Prefix
            backend:
              service:
                name: ingestion
                port:
                  name: http
          # Config API: flags, experiments, SDK configuration
          - path: /v1/config
            pathType: Prefix
            backend:
              service:
                name: config
                port:
                  name: http
          # Config API: SSE endpoint for real-time flag updates
          - path: /v1/flags/stream
            pathType: Prefix
            backend:
              service:
                name: config
                port:
                  name: sse
          # Query API: analytics and data querying
          - path: /v1/query
            pathType: Prefix
            backend:
              service:
                name: query
                port:
                  name: http
          # Agents API: AI agent interactions
          - path: /v1/agents
            pathType: Prefix
            backend:
              service:
                name: agents
                port:
                  name: http
