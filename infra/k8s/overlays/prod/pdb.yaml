apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingestion-pdb
  namespace: apdl
  labels:
    app.kubernetes.io/name: ingestion
    app.kubernetes.io/part-of: apdl
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestion
