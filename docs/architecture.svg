<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">APDL Architecture</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- SDK -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="370" y="56" width="360" height="68" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">@apdl/sdk</text>
  <text x="550" y="102" text-anchor="middle" font-size="12" fill="#3b82f6">TypeScript  |  Auto-capture  |  Flags  |  SSE  |  UI Components  |  Privacy</text>

  <!-- SDK arrows down -->
  <line x1="460" y1="124" x2="260" y2="178" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="640" y1="124" x2="820" y2="178" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Arrow labels -->
  <text x="330" y="148" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">POST /v1/events</text>
  <text x="760" y="148" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">SSE /v1/stream</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Ingestion Service -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="100" y="180" width="310" height="80" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">Ingestion Service</text>
  <text x="255" y="226" text-anchor="middle" font-size="11" fill="#a16207">C++ / Crow HTTP</text>
  <text x="255" y="244" text-anchor="middle" font-size="10" fill="#ca8a04">Auth  |  Rate Limit  |  Schema Validation</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Config Service -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="680" y="180" width="310" height="80" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="835" y="208" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">Config Service</text>
  <text x="835" y="226" text-anchor="middle" font-size="11" fill="#a16207">C++ / Crow HTTP</text>
  <text x="835" y="244" text-anchor="middle" font-size="10" fill="#ca8a04">Flags CRUD  |  Experiments  |  SSE Broadcast</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Data stores row -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Ingestion -> Redis Streams -->
  <line x1="255" y1="260" x2="255" y2="308" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Redis Streams -->
  <rect x="100" y="310" width="310" height="60" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Redis Streams</text>
  <text x="255" y="354" text-anchor="middle" font-size="10" fill="#dc2626">events:raw:{project_id}  |  config:updates  |  agent:tasks</text>

  <!-- Config -> Redis Cache -->
  <line x1="770" y1="260" x2="700" y2="308" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Config -> PostgreSQL -->
  <line x1="900" y1="260" x2="930" y2="308" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Redis Cache -->
  <rect x="590" y="310" width="180" height="60" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Redis Cache</text>
  <text x="680" y="354" text-anchor="middle" font-size="10" fill="#dc2626">Flag config cache</text>

  <!-- PostgreSQL -->
  <rect x="800" y="310" width="200" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PostgreSQL + pgvector</text>
  <text x="900" y="354" text-anchor="middle" font-size="10" fill="#16a34a">flags | experiments | ui_configs | memory</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Pipeline: Redis Streams -> Writer -> ClickHouse -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Redis Streams -> ClickHouse Writer -->
  <line x1="255" y1="370" x2="255" y2="418" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ClickHouse Writer -->
  <rect x="100" y="420" width="310" height="56" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">ClickHouse Writer</text>
  <text x="255" y="462" text-anchor="middle" font-size="10" fill="#7c3aed">Python  |  Batch insert  |  Consumer groups</text>

  <!-- Writer -> ClickHouse -->
  <line x1="255" y1="476" x2="255" y2="518" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ClickHouse -->
  <rect x="100" y="520" width="310" height="60" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="546" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">ClickHouse</text>
  <text x="255" y="564" text-anchor="middle" font-size="10" fill="#ea580c">events | sessions | experiments | materialized views</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Query Service -->
  <!-- ════════════════════════════════════════════ -->

  <!-- ClickHouse -> Query Service -->
  <line x1="255" y1="580" x2="255" y2="628" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="100" y="630" width="310" height="72" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="656" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Query Service</text>
  <text x="255" y="674" text-anchor="middle" font-size="11" fill="#059669">Python / FastAPI</text>
  <text x="255" y="692" text-anchor="middle" font-size="10" fill="#10b981">Funnels  |  Cohorts  |  Retention  |  Experiment Stats</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Agents Service (wide, at bottom) -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Query -> Agents -->
  <line x1="255" y1="702" x2="400" y2="758" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- PostgreSQL -> Agents -->
  <line x1="900" y1="370" x2="900" y2="740" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="900" y1="740" x2="800" y2="758" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="200" y="760" width="700" height="140" rx="12" fill="#fdf4ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="790" text-anchor="middle" font-size="15" font-weight="700" fill="#6b21a8">Agents Service</text>
  <text x="550" y="808" text-anchor="middle" font-size="11" fill="#9333ea">Python / FastAPI / LangGraph</text>

  <!-- Agent sub-items -->
  <rect x="224" y="822" width="148" height="32" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="298" y="843" text-anchor="middle" font-size="10" font-weight="600" fill="#7e22ce">Behavior Analysis</text>

  <rect x="384" y="822" width="148" height="32" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="458" y="843" text-anchor="middle" font-size="10" font-weight="600" fill="#7e22ce">Experiment Design</text>

  <rect x="544" y="822" width="130" height="32" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="609" y="843" text-anchor="middle" font-size="10" font-weight="600" fill="#7e22ce">Personalization</text>

  <rect x="686" y="822" width="148" height="32" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="760" y="843" text-anchor="middle" font-size="10" font-weight="600" fill="#7e22ce">Feature Proposals</text>

  <!-- Bottom labels -->
  <text x="350" y="882" text-anchor="middle" font-size="10" fill="#9333ea">pgvector Memory</text>
  <text x="550" y="882" text-anchor="middle" font-size="10" fill="#9333ea">Safety + Audit</text>
  <text x="750" y="882" text-anchor="middle" font-size="10" fill="#9333ea">Rollback</text>

  <!-- Separator dots -->
  <circle cx="450" cy="879" r="2" fill="#c084fc"/>
  <circle cx="650" cy="879" r="2" fill="#c084fc"/>

</svg>
